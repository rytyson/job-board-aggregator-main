<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IT Leadership Job Alerts</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2d3148;
      --text: #e2e4ef;
      --muted: #8b90a8;
      --accent: #5b8def;
      --green: #3ecf8e;
      --yellow: #f0c060;
      --red: #e05b5b;
      --badge-new-bg: #1e3a2f;
      --badge-new-text: #3ecf8e;
      --badge-remote-bg: #1e2a3e;
      --badge-remote-text: #5b8def;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
    }
    header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    header p { color: var(--muted); font-size: 13px; }

    /* ── Toolbar row 1: search + filters ─────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .toolbar input[type="text"] {
      flex: 1;
      min-width: 180px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .toolbar input[type="text"]:focus { border-color: var(--accent); }
    .toolbar select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
    }
    .rss-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #4a2010;
      color: #f0a060;
      border-radius: 6px;
      padding: 7px 12px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .rss-link:hover { background: #5a2818; }

    /* ── Toolbar row 2: status tabs + toggles ────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .status-tabs { display: flex; gap: 0; }
    .tab-btn {
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-count {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      background: var(--bg);
      color: var(--muted);
      padding: 1px 5px;
      border-radius: 10px;
      margin-left: 4px;
      min-width: 18px;
      text-align: center;
    }
    .tab-btn.active .tab-count { background: #1e2a4e; color: var(--accent); }
    .toggle-group {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      padding: 10px 0;
    }
    .toggle-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
    }
    .toggle-group input[type="checkbox"] { cursor: pointer; accent-color: var(--accent); }

    /* ── Stats bar ───────────────────────────────────────────────────────── */
    .stats {
      padding: 10px 24px;
      font-size: 12px;
      color: var(--muted);
    }
    .stats b { color: var(--text); }

    /* ── Table ───────────────────────────────────────────────────────────── */
    .table-wrap { padding: 0 24px 40px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    thead th {
      text-align: left;
      padding: 10px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    thead th:hover { color: var(--text); }
    thead th.sorted { color: var(--accent); }
    thead th.sorted::after { content: attr(data-arrow); margin-left: 4px; opacity: 0.8; }
    thead th.no-sort { cursor: default; }
    thead th.no-sort:hover { color: var(--muted); }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:hover { background: var(--surface); }
    tbody tr.row-applied { opacity: 0.55; }
    tbody tr.row-ignored { opacity: 0.40; }
    td { padding: 10px 10px; vertical-align: top; }

    .job-title a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
    }
    .job-title a:hover { color: var(--accent); text-decoration: underline; }

    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-new  { background: var(--badge-new-bg);    color: var(--badge-new-text); }
    .badge-remote { background: var(--badge-remote-bg); color: var(--badge-remote-text); }

    .platform-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .col-date  { white-space: nowrap; color: var(--muted); font-size: 12px; }
    .col-loc   { font-size: 12px; color: var(--muted); max-width: 150px; }
    .col-salary { font-size: 12px; color: var(--green); white-space: nowrap; }
    .col-salary.no-salary { color: var(--muted); }

    .verified-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--green);
      white-space: nowrap;
    }
    .verified-badge.old { color: var(--muted); }

    /* ── Action buttons ──────────────────────────────────────────────────── */
    .action-btns { display: flex; gap: 4px; }
    .action-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--text); }
    .action-btn.st-saved    { background: #2a2510; border-color: var(--yellow); color: var(--yellow); }
    .action-btn.st-applied  { background: #1a2e1a; border-color: var(--green);  color: var(--green);  }
    .action-btn.st-ignored  { background: #2a1a1a; border-color: var(--red);    color: var(--red);    }

    .apply-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      white-space: nowrap;
    }
    .apply-link:hover { text-decoration: underline; }

    /* ── Empty / loading states ──────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty p { margin-top: 8px; font-size: 13px; }
    #loading  { text-align: center; padding: 60px 20px; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <h1>IT Leadership Job Alerts</h1>
  <p id="header-sub">Director / VP / Head of IT roles in Operations, Infrastructure &amp; Service Delivery — Remote or Jacksonville, FL</p>
</header>

<!-- Toolbar row 1: search + platform + RSS -->
<div class="toolbar">
  <input type="text" id="search" placeholder="Search title, company, or location …">
  <select id="platform-filter">
    <option value="">All platforms</option>
    <option value="Ashby">Ashby</option>
    <option value="BambooHR">BambooHR</option>
    <option value="Greenhouse">Greenhouse</option>
    <option value="iCIMS">iCIMS</option>
    <option value="Lever">Lever</option>
    <option value="Workday">Workday</option>
  </select>
  <a class="rss-link" href="job_feed.xml" target="_blank">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
      <circle cx="6.18" cy="17.82" r="2.18"/>
      <path d="M4 4.44v2.83c7.03 0 12.73 5.7 12.73 12.73h2.83c0-8.59-6.97-15.56-15.56-15.56zm0 5.66v2.83c3.9 0 7.07 3.17 7.07 7.07h2.83c0-5.47-4.43-9.9-9.9-9.9z"/>
    </svg>
    Subscribe RSS
  </a>
</div>

<!-- Toolbar row 2: status tabs + hide toggle -->
<div class="status-bar">
  <div class="status-tabs">
    <button class="tab-btn active" data-tab="">All <span class="tab-count" id="cnt-all">0</span></button>
    <button class="tab-btn" data-tab="saved">Saved <span class="tab-count" id="cnt-saved">0</span></button>
    <button class="tab-btn" data-tab="applied">Applied <span class="tab-count" id="cnt-applied">0</span></button>
    <button class="tab-btn" data-tab="ignored">Ignored <span class="tab-count" id="cnt-ignored">0</span></button>
  </div>
  <div class="toggle-group">
    <label>
      <input type="checkbox" id="hide-actioned">
      Hide applied &amp; ignored
    </label>
  </div>
</div>

<div class="stats" id="stats">Loading …</div>

<div class="table-wrap">
  <div id="loading">Loading job data …</div>
  <table id="jobs-table" style="display:none">
    <thead>
      <tr>
        <th data-col="title" data-arrow="↑">Title</th>
        <th data-col="company" data-arrow="↑">Company</th>
        <th data-col="location" data-arrow="↑">Location</th>
        <th data-col="salary_posted" data-arrow="↑">Salary</th>
        <th data-col="first_seen" class="sorted" data-arrow="↓">Date</th>
        <th data-col="liveness_checked_at" data-arrow="↑">Verified</th>
        <th data-col="platform_source" data-arrow="↑">Platform</th>
        <th class="no-sort">Actions</th>
        <th class="no-sort">Apply</th>
      </tr>
    </thead>
    <tbody id="jobs-body"></tbody>
  </table>
  <div id="no-results" class="empty" style="display:none">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#8b90a8" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <p>No jobs match the current filter.</p>
  </div>
</div>

<script>
  // ── Data ──────────────────────────────────────────────────────────────────
  let allJobs = [];
  let sortCol = 'first_seen';
  let sortAsc = false;
  let activeTab = '';   // '' | 'saved' | 'applied' | 'ignored'

  // ── localStorage ─────────────────────────────────────────────────────────
  const STORAGE_KEY = 'it-job-statuses';

  function loadStatuses() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
    catch (_) { return {}; }
  }

  function setStatus(jobId, status) {
    const statuses = loadStatuses();
    const existing = statuses[jobId]?.status;
    if (existing === status) {
      delete statuses[jobId];   // clicking the active button clears it
    } else {
      statuses[jobId] = { status, timestamp: new Date().toISOString() };
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(statuses));
    updateTabCounts();
    renderTable();
  }

  function getStatus(jobId) {
    return loadStatuses()[jobId]?.status || null;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function daysSince(dateStr) {
    if (!dateStr) return 999;
    return Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
  }

  function isRemote(loc) {
    if (!loc) return false;
    const l = loc.toLowerCase();
    return l.includes('remote') || l.includes('anywhere')
        || l.includes('work from home') || l.includes('wfh');
  }

  function fmtDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr + (dateStr.length === 10 ? 'T12:00:00' : ''));
    if (isNaN(d)) return dateStr;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function fmtVerified(isoStr) {
    if (!isoStr) return '';
    const d = new Date(isoStr);
    if (isNaN(d)) return '';
    const days = Math.floor((Date.now() - d.getTime()) / 86400000);
    if (days === 0) return 'Today';
    if (days === 1) return 'Yesterday';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  // ── Tab counts ────────────────────────────────────────────────────────────
  function updateTabCounts() {
    const statuses = loadStatuses();
    const counts = { saved: 0, applied: 0, ignored: 0 };
    for (const job of allJobs) {
      const s = statuses[job.job_id]?.status;
      if (s && counts[s] !== undefined) counts[s]++;
    }
    document.getElementById('cnt-all').textContent = allJobs.length;
    document.getElementById('cnt-saved').textContent = counts.saved;
    document.getElementById('cnt-applied').textContent = counts.applied;
    document.getElementById('cnt-ignored').textContent = counts.ignored;
  }

  // ── Main render ───────────────────────────────────────────────────────────
  function renderTable() {
    const query        = document.getElementById('search').value.toLowerCase().trim();
    const platFilter   = document.getElementById('platform-filter').value;
    const hideActioned = document.getElementById('hide-actioned').checked;
    const statuses     = loadStatuses();

    let jobs = allJobs.filter(job => {
      if (platFilter && job.platform_source !== platFilter) return false;

      if (query) {
        const hay = (job.title + ' ' + job.company + ' ' + (job.location || '')).toLowerCase();
        if (!hay.includes(query)) return false;
      }

      const status = statuses[job.job_id]?.status || null;

      // Status tab filter
      if (activeTab === 'saved'   && status !== 'saved')   return false;
      if (activeTab === 'applied' && status !== 'applied') return false;
      if (activeTab === 'ignored' && status !== 'ignored') return false;

      // Hide actioned toggle (only on the "All" tab)
      if (activeTab === '' && hideActioned && (status === 'applied' || status === 'ignored')) return false;

      return true;
    });

    // Sort — date columns use numeric timestamps so null values and mixed
    // formats never produce wrong order. "Posted" sorts by date_posted ?? first_seen
    // to match what the column actually displays.
    const DATE_COLS = new Set(['first_seen', 'last_seen', 'date_posted', 'liveness_checked_at']);

    function sortVal(job, col) {
      if (DATE_COLS.has(col)) {
        const raw = col === 'first_seen'
          ? (job.date_posted || job.first_seen || '')   // match displayed value
          : (job[col] || '');
        if (!raw) return sortAsc ? Infinity : -Infinity; // nulls always last
        const ts = new Date(raw).getTime();
        return isNaN(ts) ? (sortAsc ? Infinity : -Infinity) : ts;
      }
      return String(job[col] || '').toLowerCase();
    }

    jobs.sort((a, b) => {
      const av = sortVal(a, sortCol);
      const bv = sortVal(b, sortCol);
      if (av < bv) return sortAsc ? -1 : 1;
      if (av > bv) return sortAsc ? 1  : -1;
      return 0;
    });

    const tbody = document.getElementById('jobs-body');
    tbody.innerHTML = '';

    if (!jobs.length) {
      document.getElementById('jobs-table').style.display = 'none';
      document.getElementById('no-results').style.display = 'block';
      document.getElementById('stats').innerHTML = 'No jobs match the current filter.';
      return;
    }

    document.getElementById('jobs-table').style.display = 'table';
    document.getElementById('no-results').style.display = 'none';

    for (const job of jobs) {
      const status  = statuses[job.job_id]?.status || null;
      const isNew   = daysSince(job.first_seen) <= 7;
      const remote  = isRemote(job.location);
      const url     = escHtml(job.application_url || '#');
      const loc     = escHtml(job.location || '—');
      // date_posted is only set when the liveness check extracted it from the
      // actual page — it's the real post date. first_seen is when our system
      // first spotted the job in the chunks. Show which one we're using.
      const hasVerifiedDate = !!(job.liveness_checked_at && job.date_posted);
      const postedDate      = hasVerifiedDate ? job.date_posted : job.first_seen;
      const dateLabel       = hasVerifiedDate ? 'Posted' : 'First seen';

      const newBadge    = isNew ? '<span class="badge badge-new">NEW</span> ' : '';
      const remoteBadge = remote ? '<span class="badge badge-remote">Remote</span> ' : '';

      // Salary cell
      const salaryHtml = job.salary_posted
        ? `<span class="col-salary">${escHtml(job.salary_posted)}</span>`
        : `<span class="col-salary no-salary">—</span>`;

      // Verified cell
      let verifiedHtml = '—';
      if (job.liveness_checked_at) {
        const label = fmtVerified(job.liveness_checked_at);
        const daysOld = daysSince(job.liveness_checked_at.slice(0, 10));
        const cls = daysOld > 2 ? 'verified-badge old' : 'verified-badge';
        verifiedHtml = `<span class="${cls}" title="Verified ${job.liveness_checked_at.slice(0,10)}">✓ ${escHtml(label)}</span>`;
      }

      // Action buttons
      const btnSave  = `<button class="action-btn${status==='saved'   ? ' st-saved'   : ''}" onclick="setStatus('${escHtml(job.job_id)}','saved')"   title="Save for later">★</button>`;
      const btnApply = `<button class="action-btn${status==='applied' ? ' st-applied' : ''}" onclick="setStatus('${escHtml(job.job_id)}','applied')" title="Mark applied">✓</button>`;
      const btnIgnore= `<button class="action-btn${status==='ignored' ? ' st-ignored' : ''}" onclick="setStatus('${escHtml(job.job_id)}','ignored')" title="Not interested">✗</button>`;

      const row = document.createElement('tr');
      if (status === 'applied') row.classList.add('row-applied');
      if (status === 'ignored') row.classList.add('row-ignored');

      row.innerHTML = `
        <td class="job-title">${newBadge}<a href="${url}" target="_blank" rel="noopener">${escHtml(job.title)}</a></td>
        <td>${escHtml(job.company)}</td>
        <td class="col-loc">${remoteBadge}${loc}</td>
        <td>${salaryHtml}</td>
        <td class="col-date" title="${escHtml(dateLabel)}: ${escHtml(postedDate || '')}">
          <span style="font-size:10px;color:var(--muted);display:block;line-height:1.2">${escHtml(dateLabel)}</span>
          ${fmtDate(postedDate)}
        </td>
        <td>${verifiedHtml}</td>
        <td><span class="platform-pill">${escHtml(job.platform_source)}</span></td>
        <td><div class="action-btns">${btnSave}${btnApply}${btnIgnore}</div></td>
        <td><a class="apply-link" href="${url}" target="_blank" rel="noopener">Apply →</a></td>
      `;
      tbody.appendChild(row);
    }

    // Stats bar
    const total    = allJobs.length;
    const newCount = allJobs.filter(j => daysSince(j.first_seen) <= 7).length;
    const salCount = allJobs.filter(j => j.salary_posted).length;
    document.getElementById('stats').innerHTML =
      `Showing <b>${jobs.length}</b> of <b>${total}</b> live matches — `
    + `<b>${newCount}</b> added this week`
    + (salCount ? ` · <b>${salCount}</b> with salary posted` : '');
  }

  // ── Event wiring ──────────────────────────────────────────────────────────
  document.getElementById('search').addEventListener('input', renderTable);
  document.getElementById('platform-filter').addEventListener('change', renderTable);
  document.getElementById('hide-actioned').addEventListener('change', renderTable);

  // Sortable column headers
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = col !== 'first_seen' && col !== 'liveness_checked_at';
      }
      document.querySelectorAll('thead th').forEach(t => {
        t.classList.remove('sorted');
        if (t.dataset.arrow) t.dataset.arrow = t.dataset.arrow.replace(/[↑↓]/, '↑');
      });
      th.classList.add('sorted');
      th.dataset.arrow = sortAsc ? '↑' : '↓';
      renderTable();
    });
  });

  // Status tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTable();
    });
  });

  // ── Load jobs_db.json ─────────────────────────────────────────────────────
  fetch('jobs_db.json?_=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      allJobs = data.jobs || [];
      document.getElementById('loading').style.display = 'none';

      const updated = data.last_updated
        ? new Date(data.last_updated).toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' })
        : '—';
      document.getElementById('header-sub').textContent =
        `Director / VP / Head of IT roles — Remote or Jacksonville, FL · Last updated: ${updated}`;

      updateTabCounts();
      renderTable();
    })
    .catch(err => {
      document.getElementById('loading').innerHTML =
        `<p style="color:var(--muted)">Could not load jobs_db.json.<br>
        Run <code>python alerts/main.py</code> locally, or wait for the GitHub Action to complete.<br>
        <small style="color:#666">${err}</small></p>`;
    });
</script>
</body>
</html>
