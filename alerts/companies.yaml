# companies.yaml — Single source of truth for which companies to monitor.
#
# HOW TO ADD A COMPANY
# --------------------
# Greenhouse: find the slug at https://boards.greenhouse.io/<slug>
#   Add:  - slug: "the-slug"
#           name: "Company Name"
#
# Lever: find the slug at https://jobs.lever.co/<slug>
#   Add:  - slug: "the-slug"
#           name: "Company Name"
#
# Workday: format is "company|wd#|site_id"
#   Find it from: https://<company>.wd<N>.myworkdayjobs.com/en-US/<site_id>
#   Add:  - slug: "company|wd5|site_id"
#           name: "Company Name"
#
# Slugs that return 404 or have no jobs are logged and silently skipped each run.
# Remove dead slugs from this file or let the discovery module flag them.

